<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1 id="quizBox">
        <div>
            <h4 id="QuesNum">Question number</h4>
        </div>
        <div>
           <h3 id="Ques">Question area</h3>
           <div>
            <button id="opt1" onclick="SelectedAns(this)" class="option">
                first option
            </button></br>
            <button id="opt2" onclick="SelectedAns(this)" class="option">
                second option
            </button></br>
            <button id="opt3" onclick="SelectedAns(this)" class="option">
                third option
            </button></br>
            <button id="opt4" onclick="SelectedAns(this)" class="option">
                forth option
            </button></br>
           </div>
           <div class="input">
            <div placeholder="prev" id="prev" class="in">
                Prev
            </div>
            <div placeholder="next" id="next" class="in">
                Next
            </div>
           </div>
        </div>


    </h1>
      <div id="resultBox" style="display:none">
            <h2>Quiz Finished</h2>
            <h3 id="score">Score</h3>
           <button onclick="RestartQuiz()">Restart Quiz</button>
        </div>
    <script src="./script.js"></script>
</body>
</html>
